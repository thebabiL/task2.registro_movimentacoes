services:
  mongo:
    image: mongo:7
    container_name: registro-mongo-homolog
    restart: unless-stopped
    volumes:
      - mongo_data_homolog:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_NAME:-registro_movimentacoes:homolog}
    container_name: registro-app-homolog
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/controle_financeiro_homolog
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    ports:
      - "8082:8080"

volumes:
  mongo_data_homolog:

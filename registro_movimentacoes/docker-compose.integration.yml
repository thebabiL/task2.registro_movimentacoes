services:
  mongo:
    image: mongo:7
    container_name: registro-mongo-int
    restart: unless-stopped
    volumes:
      - mongo_data_int:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: ${IMAGE_NAME:-registro_movimentacoes:integration}
    container_name: registro-app-int
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/controle_financeiro_int
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-barbara.leidemer@universo.univates.br}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-xqqmjlkllwdmmzfy}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    ports:
      - "8081:8080"

volumes:
  mongo_data_int:

services:
  mongo:
    image: mongo:7
    container_name: registro-mongo-prod
    restart: unless-stopped
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_NAME:-registro_movimentacoes:production}
    container_name: registro-app-prod
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/controle_financeiro_prod
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-barbara.leidemer@universo.univates.br}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-xqqmjlkllwdmmzfy}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    ports:
      - "8080:8080"

volumes:
  mongo_data_prod:
